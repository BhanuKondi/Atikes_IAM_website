{% extends "layouts/base.html" %}
{% block title %}Join ATIKES IAM Community{% endblock %}
{% block content %}
<section class="form-page">
  <form class="form-card auth-card" method="post">
    <p class="eyebrow">Join the community</p>
    <h1>Create account</h1>
    <label>Name
      <input name="name" required autocomplete="name">
    </label>
    <label>Email
      <input type="email" name="email" required autocomplete="email">
    </label>
    <label>IAM title
      <input name="title" placeholder="SailPoint Engineer, IAM Consultant, Security Architect">
    </label>
    <label>Password
      <input type="password" name="password" required minlength="8" autocomplete="new-password">
    </label>
    <button class="primary-button" type="submit">Create account</button>
    <p class="form-note">Already registered? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
  </form>
</section>
{% endblock %}
