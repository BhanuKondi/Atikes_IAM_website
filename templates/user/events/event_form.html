{% extends "layouts/base.html" %}
{% block title %}{{ "Edit" if event else "Add" }} Event - ATIKES{% endblock %}
{% block content %}
<section class="form-page">
  <form class="form-card" method="post">
    <p class="eyebrow">Admin events</p>
    <h1>{{ "Edit Event" if event else "Add Event" }}</h1>
    <label>Title
      <input name="title" value="{{ event.title if event else '' }}" required>
    </label>
    <label>Description
      <textarea name="description" rows="6">{{ event.description if event else '' }}</textarea>
    </label>
    <label>Type
      <input name="event_type" value="{{ event.event_type if event else 'Webinar' }}">
    </label>
    <label>Organizer
      <input name="organizer" value="{{ event.organizer if event else 'ATIKES' }}">
    </label>
    <label>Location
      <input name="location" value="{{ event.location if event else 'Online' }}">
    </label>
    <label>Starts at
      <input type="datetime-local" name="starts_at" value="{{ event.starts_at.strftime('%Y-%m-%dT%H:%M') if event else '' }}" required>
    </label>
    <label>Ends at
      <input type="datetime-local" name="ends_at" value="{{ event.ends_at.strftime('%Y-%m-%dT%H:%M') if event and event.ends_at else '' }}">
    </label>
    <label>Registration URL
      <input name="registration_url" value="{{ event.registration_url if event else '' }}">
    </label>
    <label>Source URL
      <input name="source_url" value="{{ event.source_url if event else '' }}">
    </label>
    <label class="checkbox-row">
      <input type="checkbox" name="is_published" {% if not event or event.is_published %}checked{% endif %}>
      Published
    </label>
    <button class="primary-button" type="submit">Save Event</button>
  </form>
</section>
{% endblock %}
