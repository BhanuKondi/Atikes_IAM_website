{% extends "base.html" %}
{% block title %}Edit Trend - ATIKES Admin{% endblock %}
{% block content %}
<section class="form-page">
  <form class="form-card" method="post" enctype="multipart/form-data">
    <p class="eyebrow">Admin review</p>
    <h1>Edit Trend</h1>
    <label>Title <input name="title" value="{{ trend.title }}" required></label>
    <label>Category <input name="category" value="{{ trend.category }}" required></label>
    <label>URL <input name="url" value="{{ trend.url }}" required></label>
    <label>Image URL <input name="image_url" value="{{ trend.image_url }}"></label>
    <label>Upload image <input type="file" name="image" accept=".jpg,.jpeg,.png,.webp,.gif"></label>
    <label>Summary <textarea name="summary" rows="8">{{ trend.summary }}</textarea></label>
    <div class="editor-toolbar">
      <button type="button" class="ghost-button" data-format="bold">Bold</button>
      <button type="button" class="ghost-button" data-format="italic">Italic</button>
    </div>
    <label>Generated website content <textarea name="generated_content" rows="12" data-rich-editor>{{ trend.generated_content }}</textarea></label>
    <div class="button-row">
      <button class="ghost-button" name="action" value="save" type="submit">Save</button>
      <button class="primary-button" name="action" value="approve" type="submit">Post</button>
    </div>
  </form>
</section>
{% endblock %}
